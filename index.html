<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gardırop — Dijital Dolap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     TASARIM SİSTEMİ — "Askı Etiketi" (Hang-Tag) Konsepti
     Fikir: Gerçek kıyafet bakım etiketlerinden / askı fişlerinden
     ilham alan, ip ve delikli etiket motifini tüm arayüzde
     tekrar eden bir imza öğesi olarak kullanıyoruz.
     ============================================================ */
  :root{
    --ink:        #211E1B;   /* karanlık mod zemin — loş dolap ahşabı */
    --ink-surface:#2B2724;   /* karanlık mod kart yüzeyi */
    --ink-surface-2:#332E2A;
    --ink-text:   #EDE7DC;   /* karanlık modda ana metin */
    --ink-muted:  #A99E8E;

    --linen:      #F6F2EA;   /* aydınlık mod zemin — keten beyazı */
    --linen-surface:#FFFFFF;
    --linen-surface-2:#EFE9DD;
    --linen-text: #2B2724;
    --linen-muted:#7A7264;

    --brass:      #C89B3C;   /* birincil vurgu — pirinç toka/düğme */
    --brass-ink:  #4A3A12;
    --sage:       #6E8F6C;   /* dolapta / temiz */
    --rust:       #B25539;   /* kirlide */
    --denim:      #4C7A9E;   /* makinede */

    --radius-tag: 14px;
    --radius-pill: 999px;
    --shadow-card: 0 6px 20px rgba(0,0,0,0.18);
    --font-display: 'IBM Plex Mono', 'Courier New', monospace;
    --font-body: 'Sora', system-ui, -apple-system, sans-serif;

    color-scheme: light;
    --bg: var(--linen);
    --surface: var(--linen-surface);
    --surface-2: var(--linen-surface-2);
    --text: var(--linen-text);
    --muted: var(--linen-muted);
  }

  [data-theme="dark"]{
    color-scheme: dark;
    --bg: var(--ink);
    --surface: var(--ink-surface);
    --surface-2: var(--ink-surface-2);
    --text: var(--ink-text);
    --muted: var(--ink-muted);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    transition: background 0.25s ease, color 0.25s ease;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }

  /* ---------- KLAVYE ERİŞİLEBİLİRLİĞİ ---------- */
  :focus-visible{
    outline: 2px solid var(--brass);
    outline-offset: 2px;
  }
  button:focus-visible, .tab:focus-visible, .status-chip:focus-visible{
    outline-offset: 1px;
  }

  .app{
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }
  @media (min-width: 900px){
    .app{ max-width: 960px; padding-top: 32px; }
  }
  @media (min-width: 1280px){
    .app{ max-width: 1180px; }
  }

  /* ---------- ÜST BAR ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 22px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand-mark{
    font-family: var(--font-display);
    font-weight:700;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .brand-mark span{ color: var(--brass); }
  .brand-sub{
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-display);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---------- Bağlantı göstergesi (Supabase durumu) ---------- */
  .conn-dot{
    display:inline-block;
    width:8px; height:8px;
    border-radius:50%;
    margin-left:8px;
    background: var(--muted);
    vertical-align: middle;
    transition: background .2s ease;
  }
  .conn-dot[data-state="online"]{ background: var(--sage); box-shadow:0 0 0 3px color-mix(in srgb, var(--sage) 25%, transparent); }
  .conn-dot[data-state="offline"]{ background: var(--rust); box-shadow:0 0 0 3px color-mix(in srgb, var(--rust) 25%, transparent); }
  .conn-label{
    font-family: var(--font-display);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-top: 2px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    text-decoration: underline dotted;
    text-underline-offset: 2px;
  }

  .theme-toggle{
    width:42px; height:42px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--surface-2);
    background: var(--surface);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color: var(--text);
    box-shadow: var(--shadow-card);
  }
  .theme-toggle svg{ width:20px; height:20px; }

  /* ---------- ASKI RAYI SEKMELERİ (imza öğesi #1) ---------- */
  .rail{
    position:relative;
    margin-bottom: 26px;
  }
  .rail-line{
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background: linear-gradient(90deg, var(--brass), var(--surface-2) 85%);
    border-radius: 3px;
    opacity:0.6;
  }
  .tabs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-top: 14px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    position:relative;
    flex: 0 0 auto;
    font-family: var(--font-display);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight:600;
    padding: 9px 16px 8px;
    border-radius: 0 0 10px 10px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--surface-2);
    border-top: none;
    cursor:pointer;
    white-space:nowrap;
    transition: color .15s ease, background .15s ease, transform .15s ease;
  }
  .tab::before{
    /* askı ipi çentiği */
    content:"";
    position:absolute;
    top:-14px; left:50%;
    transform: translateX(-50%);
    width:2px; height:14px;
    background: var(--surface-2);
  }
  .tab.active{
    color: var(--bg);
    background: var(--brass);
    border-color: var(--brass);
  }
  .tab.active::before{ background: var(--brass); }
  .tab .count{
    margin-left:6px;
    opacity:0.7;
    font-weight:500;
  }

  /* ---------- KOMBİN ÖNERİ BUTONU ---------- */
  .combo-cta{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding: 18px 20px;
    margin-bottom: 28px;
    border-radius: var(--radius-tag);
    border: 2px dashed var(--brass);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
    font-weight:700;
    font-size: 16px;
    cursor:pointer;
    box-shadow: var(--shadow-card);
    transition: transform .15s ease, background .15s ease;
  }
  .combo-cta:hover{ transform: translateY(-2px); }
  .combo-cta:active{ transform: translateY(0); }
  .combo-cta .emoji{ font-size:20px; }

  /* ---------- KIYAFET IZGARASI ---------- */
  .section-label{
    font-family: var(--font-display);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: var(--muted);
    margin: 4px 0 12px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width:520px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
  @media (min-width:1280px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
  }

  /* ---------- ASKI ETİKETİ KARTI (imza öğesi #2) ---------- */
  .card{
    position:relative;
    background: var(--surface);
    border: 1px dashed var(--surface-2);
    border-radius: var(--radius-tag);
    padding: 14px 12px 12px;
    box-shadow: var(--shadow-card);
    animation: card-in .25s ease both;
  }
  @keyframes card-in{
    from{ opacity:0; transform: translateY(4px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .card::before{
    /* etiket ipi + deliği */
    content:"";
    position:absolute;
    top:-11px; left:50%;
    transform: translateX(-50%);
    width:14px; height:14px;
    border-radius:50%;
    border: 2px solid var(--muted);
    background: var(--bg);
  }
  .card::after{
    content:"";
    position:absolute;
    top:-3px; left:50%;
    transform: translateX(-50%);
    width:2px; height:12px;
    background: var(--muted);
  }
  .card-photo{
    width:100%;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:10px;
    overflow:hidden;
  }
  .card-photo img{ width:100%; height:100%; object-fit:cover; }
  .card-photo svg{ width:34px; height:34px; color: var(--muted); }

  .card-name{
    font-weight:700;
    font-size:14px;
    margin:0 0 2px;
    line-height:1.25;
  }
  .card-cat{
    font-family: var(--font-display);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color: var(--muted);
    margin: 0 0 10px;
  }

  .status-row{
    display:flex;
    gap:5px;
  }
  .status-chip{
    flex:1;
    font-family: var(--font-display);
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.02em;
    font-weight:600;
    text-align:center;
    padding: 6px 2px;
    border-radius: var(--radius-pill);
    border:1px solid var(--surface-2);
    background: transparent;
    color: var(--muted);
    cursor:pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .status-chip[data-state="dolapta"].is-active{ background: var(--sage); border-color: var(--sage); color:#fff; }
  .status-chip[data-state="kirlide"].is-active{ background: var(--rust); border-color: var(--rust); color:#fff; }
  .status-chip[data-state="makinede"].is-active{ background: var(--denim); border-color: var(--denim); color:#fff; }

  /* ---------- + EKLE — YÜZEN BUTON ---------- */
  .fab{
    position: fixed;
    right: 20px;
    bottom: 24px;
    width: 58px; height:58px;
    border-radius: 50%;
    background: var(--brass);
    color: var(--ink);
    border:none;
    font-size: 28px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    cursor:pointer;
    transition: transform .15s ease;
  }
  .fab:hover{ transform: scale(1.06) rotate(90deg); }

  .empty-state{
    text-align:center;
    padding: 40px 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .emoji{ font-size:32px; display:block; margin-bottom:10px; }
  .empty-state .emoji.spin{ animation: spin 1.1s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* ---------- ADIM 3: KIYAFET EKLEME MODALI ---------- */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(20,17,14,0.55);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index: 50;
    padding: 0;
  }
  .modal-overlay.open{ display:flex; }
  @media (min-width:520px){
    .modal-overlay{ align-items:center; }
  }
  .modal-box{
    position:relative;
    width:100%;
    max-width: 480px;
    max-height: 92vh;
    overflow-y:auto;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    padding: 22px 18px 24px;
    box-shadow: var(--shadow-card);
    animation: modal-in .18s ease;
  }
  @media (min-width:520px){
    .modal-box{ border-radius: var(--radius-tag); margin: 20px; }
  }
  @keyframes modal-in{ from{ transform: translateY(16px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .modal-box::before{
    content:"";
    position:absolute;
    top:-11px; left:50%;
    transform: translateX(-50%);
    width:14px; height:14px;
    border-radius:50%;
    border: 2px solid var(--muted);
    background: var(--bg);
  }
  .modal-title{
    font-family: var(--font-display);
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing:0.05em;
    font-weight:700;
    margin: 4px 0 18px;
  }
  .field-label{
    display:block;
    font-family: var(--font-display);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color: var(--muted);
    margin-bottom:6px;
  }
  .field-group{ margin-bottom:16px; }
  .text-input{
    width:100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--surface-2);
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size:14px;
  }
  .text-input:focus{ outline: 2px solid var(--brass); outline-offset:1px; }

  .segmented{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:8px;
  }
  .segmented button{
    display:flex; align-items:center; gap:6px; justify-content:center;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--surface-2);
    background: var(--bg);
    color: var(--muted);
    font-family: var(--font-body);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition: all .12s ease;
  }
  .segmented button svg{ width:16px; height:16px; }
  .segmented button.is-active{
    background: var(--brass);
    border-color: var(--brass);
    color: var(--ink);
  }

  .photo-drop{
    display:flex; align-items:center; gap:12px;
    border: 1px dashed var(--surface-2);
    border-radius: 10px;
    padding: 10px 12px;
    cursor:pointer;
    background: var(--bg);
  }
  .photo-drop .thumb{
    width:48px; height:48px;
    border-radius:8px;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }
  .photo-drop .thumb img{ width:100%; height:100%; object-fit:cover; }
  .photo-drop .thumb svg{ width:20px; height:20px; color: var(--muted); }
  .photo-drop .drop-text{ font-size:12.5px; color: var(--muted); }

  .modal-actions{
    display:flex;
    gap:10px;
    margin-top: 20px;
  }
  .btn{
    flex:1;
    padding: 12px 14px;
    border-radius: 10px;
    border:none;
    font-family: var(--font-body);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .btn-primary{ background: var(--brass); color: var(--ink); }
  .btn-primary:disabled{ opacity:0.55; cursor:not-allowed; }
  .btn-ghost{ background: var(--surface-2); color: var(--text); }

  .form-note{
    font-size:11.5px;
    color: var(--muted);
    margin-top:2px;
  }
  .form-note.error{ color: var(--rust); }

  .toast{
    position: fixed;
    left:50%; bottom: 24px;
    transform: translateX(-50%);
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--surface-2);
    box-shadow: var(--shadow-card);
    padding: 12px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    z-index: 60;
    display:none;
  }
  .toast.show{ display:block; animation: modal-in .18s ease; }

  /* ---------- ADIM 6: GÜNÜN KOMBİNİ SONUÇ MODALI ---------- */
  .combo-box{ max-width: 460px; }
  .combo-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 4px 0 6px;
  }
  .combo-item{
    position:relative;
    background: var(--bg);
    border: 1px dashed var(--surface-2);
    border-radius: 12px;
    padding: 10px;
    text-align:center;
    animation: card-in .3s ease both;
  }
  .combo-photo{
    width:100%;
    aspect-ratio: 1/1;
    border-radius: 8px;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    margin-bottom:8px;
  }
  .combo-photo img{ width:100%; height:100%; object-fit:cover; }
  .combo-photo svg{ width:28px; height:28px; color: var(--muted); }
  .combo-label{
    font-family: var(--font-display);
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color: var(--muted);
    margin: 0 0 2px;
  }
  .combo-name{
    font-weight:700;
    font-size:12.5px;
    margin:0;
    line-height:1.25;
  }
  .combo-empty{
    text-align:center;
    padding: 26px 10px 14px;
    color: var(--muted);
    font-size: 14px;
  }
  .combo-empty .emoji{ font-size:32px; display:block; margin-bottom:10px; }
  .combo-intro{
    font-size:12.5px;
    color: var(--muted);
    margin: 0 0 16px;
  }
</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div>
          <span class="brand-mark">Gardırop<span>.</span></span><span class="conn-dot" id="connDot" data-state="checking" title="Supabase bağlantı durumu"></span>
          <button class="conn-label" id="connLabel" type="button" title="Bağlantı durumu hakkında bilgi al">bağlanıyor...</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Görünümü değiştir" title="Görünümü değiştir">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>
    </header>

    <nav class="rail">
      <div class="rail-line"></div>
      <div class="tabs" id="tabs" role="tablist" aria-label="Kıyafet durumuna göre filtrele">
        <button class="tab active" data-filter="tumu" role="tab" aria-selected="true">Tümü <span class="count">4</span></button>
        <button class="tab" data-filter="dolapta" role="tab" aria-selected="false">Dolapta <span class="count">2</span></button>
        <button class="tab" data-filter="kirlide" role="tab" aria-selected="false">Kirlide <span class="count">1</span></button>
        <button class="tab" data-filter="makinede" role="tab" aria-selected="false">Makinede <span class="count">1</span></button>
      </div>
    </nav>

    <button class="combo-cta" id="comboBtn">
      <span class="emoji">🤖</span> Bugün Ne Giysem?
    </button>

    <div class="section-label">Kıyafetlerim</div>
    <div class="grid" id="clothesGrid"><!-- kartlar JS ile basılacak --></div>
  </div>

  <button class="fab" id="addBtn" aria-label="Kıyafet ekle" title="Kıyafet ekle">+</button>

  <!-- ADIM 3: Kıyafet Ekleme Modalı -->
  <div class="modal-overlay" id="addModalOverlay">
    <div class="modal-box">
      <div class="modal-title">🏷️ Yeni Kıyafet Ekle</div>
      <form id="addClothForm">
        <div class="field-group">
          <label class="field-label" for="fieldName">İsim</label>
          <input class="text-input" id="fieldName" name="name" type="text" placeholder="örn. Gri Sweatshirt" required>
        </div>

        <div class="field-group">
          <label class="field-label">Kategori</label>
          <div class="segmented" id="categorySegmented">
            <button type="button" data-category="ust_giyim">👕 Üst Giyim</button>
            <button type="button" data-category="alt_giyim">👖 Alt Giyim</button>
            <button type="button" data-category="ayakkabi">👟 Ayakkabı</button>
            <button type="button" data-category="dis_giyim">🧥 Dış Giyim</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="fieldSubtype">Tür (opsiyonel)</label>
          <input class="text-input" id="fieldSubtype" name="subtype" type="text" placeholder="örn. Tshirt, Şort, Pantolon">
        </div>

        <div class="field-group">
          <label class="field-label">Fotoğraf (opsiyonel)</label>
          <label class="photo-drop" for="fieldPhoto">
            <span class="thumb" id="photoThumb">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 7h3l2-3h6l2 3h3v13H4V7Z"/><circle cx="12" cy="13" r="3.2"/></svg>
            </span>
            <span class="drop-text" id="photoDropText">Fotoğraf seçmek için dokun</span>
          </label>
          <input type="file" id="fieldPhoto" name="photo" accept="image/*" style="display:none">
        </div>

        <p class="form-note" id="formNote">Kaydedince kıyafet "Dolapta" durumuyla eklenecek.</p>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelAddBtn">Vazgeç</button>
          <button type="submit" class="btn btn-primary" id="submitAddBtn">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ADIM 6: Günün Kombini Sonuç Modalı -->
  <div class="modal-overlay" id="comboModalOverlay">
    <div class="modal-box combo-box">
      <div class="modal-title">🎲 Günün Kombini</div>

<script>

const SUPABASE_URL = 'https://rejwihnijceusztpggng.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlandpaG5pamNldXN6dHBnZ25nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTA4ODcsImV4cCI6MjA5OTUyNjg4N30.li0LiK6GCpsqywAopA-NjlWtte5MNneAOvqY_zstxro';

let supabaseClient = null; /* HATA ÇÖZÜMÜ: CDN ile gelen 'supabase' değişkeniyle isim çakışmasını önlemek için 'supabaseClient' olarak değiştirildi */

const setupSteps = `

`;

}

document.getElementById('connLabel').addEventListener('click', showSetupInfo);
document.getElementById('setupCloseBtn').addEventListener('click', () => {

async function testSupabaseConnection(){
  if(!supabaseClient){
    setConnBadge('offline', 'mock veri (config eksik)');
    dbConnected = false;
    return;

/* HATA ÇÖZÜMÜ: <script> etiketleri birleştirildi, ReferenceError sorunu çözüldü */

/* ============================================================
   ADIM 1 — Sadece arayüz iskeleti + örnek (mock) veri.
   ============================================================ */
const sunIcon = `<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>`;
const moonIcon = `<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>`;

const root = document.documentElement;
const themeIcon = document.getElementById('themeIcon');
let currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

function applyTheme(t){
  currentTheme = t;
  if(t === 'dark'){ root.setAttribute('data-theme','dark'); themeIcon.innerHTML = sunIcon; }
  else{ root.removeAttribute('data-theme'); themeIcon.innerHTML = moonIcon; }
}
applyTheme(currentTheme);

document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
});

const categoryIcons = {
  ust_giyim: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 3l4 2 4-2 4 4-3 3v11H7V10L4 7l4-4Z"/></svg>`,
  alt_giyim: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 3h12l1 8-3 10h-3l-1-9-1 9H8L5 11 6 3Z"/></svg>`,
  ayakkabi:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 17c0-2 2-3 4-4l6-4 2 2c2 1 6 1 6 4v2H3v-0Z"/></svg>`,
  dis_giyim: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 3l5 2 5-2 3 5-3 2v11H7V10L4 8l3-5Z"/></svg>`
};
const categoryLabels = {
  ust_giyim: 'Üst Giyim', alt_giyim: 'Alt Giyim', ayakkabi: 'Ayakkabı', dis_giyim: 'Dış Giyim'
};

const mockClothesFallback = [
  { id:1, name:'Gri Sweatshirt', category:'ust_giyim', status:'dolapta', image_url:null },
  { id:2, name:'Lacivert Kot Pantolon', category:'alt_giyim', status:'dolapta', image_url:null },
  { id:3, name:'Beyaz Spor Ayakkabı', category:'ayakkabi', status:'kirlide', image_url:null },
  { id:4, name:'Kahverengi Mont', category:'dis_giyim', status:'makinede', image_url:null },
];
let mockClothes = [];
const statusLabels = { dolapta:'Dolapta', kirlide:'Kirlide', makinede:'Makinede' };

function renderCard(item){
  const icon = categoryIcons[item.category] || categoryIcons.ust_giyim;
  const photo = item.image_url
    ? `<img src="${item.image_url}" alt="${item.name}">`
    : icon;
  const chips = ['dolapta','kirlide','makinede'].map(state => `
    <button class="status-chip ${item.status === state ? 'is-active' : ''}" data-state="${state}" data-id="${item.id}" aria-pressed="${item.status === state}">
      ${statusLabels[state]}
    </button>
  `).join('');
  return `
    <div class="card" data-id="${item.id}" data-status="${item.status}" data-category="${item.category}">
      <div class="card-photo">${photo}</div>
      <p class="card-name">${item.name}</p>
      <p class="card-cat">${categoryLabels[item.category] || ''}</p>
      <div class="status-row">${chips}</div>
    </div>
  `;
}

function updateTabCounts(){
  document.querySelectorAll('#tabs .tab').forEach(tab => {
    const f = tab.dataset.filter;
    const countEl = tab.querySelector('.count');
    if(!countEl) return;
    const n = f === 'tumu' ? mockClothes.length : mockClothes.filter(c => c.status === f).length;
    countEl.textContent = `(${n})`;
  });
}

const emptyStateByFilter = {
  tumu:     { emoji:'👕', text:'Henüz hiç kıyafet eklemedin. Sağ alttaki + butonuyla ilk kıyafetini ekle!' },
  dolapta:  { emoji:'🧼', text:'Dolapta temiz kıyafet yok — hepsi kirlide veya makinede olabilir.' },
  kirlide:  { emoji:'✨', text:'Kirli kıyafet yok, harika! Her şey temiz görünüyor.' },
  makinede: { emoji:'🌀', text:'Şu an makinede bir şey yok.' },
};

function renderGrid(filter){
  const grid = document.getElementById('clothesGrid');
  const activeTab = document.querySelector('#tabs .tab.active');
  const activeFilter = filter || (activeTab ? activeTab.dataset.filter : 'tumu');
  const items = activeFilter === 'tumu' ? mockClothes : mockClothes.filter(c => c.status === activeFilter);
  if(items.length === 0){
    const state = (activeFilter === 'tumu' && mockClothes.length === 0)
      ? emptyStateByFilter.tumu
      : (emptyStateByFilter[activeFilter] || { emoji:'🧺', text:'Bu sekmede hiç kıyafet yok.' });
    grid.innerHTML = `<div class="empty-state card-in" style="grid-column: 1/-1">
      <span class="emoji">${state.emoji}</span> ${state.text}
    </div>`;
  } else {
    grid.innerHTML = items.map(renderCard).join('');
  }
  updateTabCounts();
}

async function fetchClothes(){
  if(!dbConnected){
    mockClothes = mockClothesFallback.slice();
    renderGrid();
    return;
  }
  const grid = document.getElementById('clothesGrid');
  grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1">
    <span class="emoji spin">⏳</span> Kıyafetler yükleniyor...
  </div>`;
  try{
    const { data, error } = await supabaseClient
      .from('clothes')
      .select('*')
      .order('created_at', { ascending: false });
    if(error) throw error;
    mockClothes = data || [];
    renderGrid();
  }catch(e){
    console.error('Kıyafetler çekilirken hata:', e);
    showToast('⚠️ Kıyafetler yüklenemedi: ' + e.message, true);
    mockClothes = [];
    renderGrid();
  }
}

async function updateClothStatus(id, newState){
  const item = mockClothes.find(c => c.id === id);
  if(!item) return;
  const prevStatus = item.status;
  item.status = newState;
  renderGrid();
  if(!dbConnected){
    showToast('⚠️ Supabase bağlı değil, değişiklik geçici (kaydedilmedi).', true);
    return;
  }
  try{
    const { error } = await supabaseClient
      .from('clothes')
      .update({ status: newState })
      .eq('id', id);
    if(error) throw error;
  }catch(e){
    console.error('Durum güncellenirken hata:', e);
    item.status = prevStatus;
    renderGrid();
    showToast('⚠️ Durum güncellenemedi: ' + e.message, true);
  }
}

function subscribeRealtime(){
  if(!dbConnected || !supabaseClient) return;
  supabaseClient
    .channel('clothes-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'clothes' }, (payload) => {
      if(payload.eventType === 'INSERT'){
        if(!mockClothes.some(c => c.id === payload.new.id)){
          mockClothes.unshift(payload.new);
        }
      } else if(payload.eventType === 'UPDATE'){
        const idx = mockClothes.findIndex(c => c.id === payload.new.id);
        if(idx !== -1) mockClothes[idx] = payload.new;
        else mockClothes.unshift(payload.new);
      } else if(payload.eventType === 'DELETE'){
        mockClothes = mockClothes.filter(c => c.id !== payload.old.id);
      }
      renderGrid();
    })
    .subscribe((status) => {
      if(status === 'SUBSCRIBED') console.info('🔄 Realtime aboneliği aktif (clothes tablosu).');
    });
}

(async function initClothes(){
  await testSupabaseConnection();
  await fetchClothes();
  subscribeRealtime();
})();

document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  tab.classList.add('active');
  tab.setAttribute('aria-selected', 'true');
  tab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  renderGrid(tab.dataset.filter);
});

document.getElementById('clothesGrid').addEventListener('click', (e) => {
  const chip = e.target.closest('.status-chip');
  if(!chip) return;
  const rawId = chip.dataset.id;
  const newState = chip.dataset.state;
  const item = mockClothes.find(c => String(c.id) === String(rawId));
  if(!item) return;
  updateClothStatus(item.id, newState);
});

function pickRandom(arr){
  return arr.length ? arr[Math.floor(Math.random() * arr.length)] : null;
}

function generateOutfit(){
  const clean = mockClothes.filter(c => c.status === 'dolapta');
  const tops    = clean.filter(c => c.category === 'ust_giyim');
  const bottoms = clean.filter(c => c.category === 'alt_giyim');
  const shoes   = clean.filter(c => c.category === 'ayakkabi');
  const outer   = clean.filter(c => c.category === 'dis_giyim');
  if(tops.length === 0 || bottoms.length === 0){
    return { ok:false };
  }
  return {
    ok:true,
    outfit: {
      dis_giyim: pickRandom(outer),
      ust_giyim: pickRandom(tops),
      alt_giyim: pickRandom(bottoms),
      ayakkabi:  pickRandom(shoes),
    }
  };
}

function renderComboItem(item){
  if(!item) return '';
  const icon = categoryIcons[item.category] || categoryIcons.ust_giyim;
  const photo = item.image_url
    ? `<img src="${item.image_url}" alt="${item.name}">`
    : icon;
  return `
    <div class="combo-item">
      <div class="combo-photo">${photo}</div>
      <p class="combo-label">${categoryLabels[item.category] || ''}</p>
      <p class="combo-name">${item.name}</p>
    </div>
  `;
}

function showComboResult(){
  const result = generateOutfit();
  const body = document.getElementById('comboModalBody');
  const intro = document.getElementById('comboIntro');
  const regenBtn = document.getElementById('comboRegenBtn');
  if(!result.ok){
    intro.style.display = 'none';
    regenBtn.style.display = 'none';
    body.innerHTML = `<div class="combo-empty">
      <span class="emoji">🧺</span>
      Dolapta yeterli temiz kıyafet yok, çamaşır yıkama zamanı!
    </div>`;
  } else {
    intro.style.display = '';
    regenBtn.style.display = '';
    const order = ['dis_giyim', 'ust_giyim', 'alt_giyim', 'ayakkabi'];
    body.innerHTML = `<div class="combo-grid">${
      order.map(key => renderComboItem(result.outfit[key])).join('')
    }</div>`;
  }
  document.getElementById('comboModalOverlay').classList.add('open');
}

document.getElementById('comboBtn').addEventListener('click', showComboResult);
document.getElementById('comboRegenBtn').addEventListener('click', showComboResult);
document.getElementById('comboCloseBtn').addEventListener('click', () => {
  document.getElementById('comboModalOverlay').classList.remove('open');
});
document.getElementById('comboModalOverlay').addEventListener('click', (e) => {
  if(e.target === document.getElementById('comboModalOverlay')){
    document.getElementById('comboModalOverlay').classList.remove('open');
  }
});

const overlay       = document.getElementById('addModalOverlay');
const addForm       = document.getElementById('addClothForm');
const fieldName     = document.getElementById('fieldName');
const fieldSubtype  = document.getElementById('fieldSubtype');
const fieldPhoto    = document.getElementById('fieldPhoto');
const photoThumb    = document.getElementById('photoThumb');
const photoDropText = document.getElementById('photoDropText');
const formNote      = document.getElementById('formNote');
const submitBtn     = document.getElementById('submitAddBtn');
const categorySeg   = document.getElementById('categorySegmented');
const toastEl       = document.getElementById('toast');

let selectedCategory = null;
let selectedPhotoFile = null;
const emptyThumbSvg = photoThumb.innerHTML;

function showToast(msg, isError = false){
  toastEl.textContent = msg;
  toastEl.style.borderColor = isError ? 'var(--rust)' : 'var(--surface-2)';
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toastEl.classList.remove('show'), 3200);
}

function openModal(){
  overlay.classList.add('open');
}
function closeModal(){
  overlay.classList.remove('open');
  addForm.reset();
  selectedCategory = null;
  selectedPhotoFile = null;
  photoThumb.innerHTML = emptyThumbSvg;
  photoDropText.textContent = 'Fotoğraf seçmek için dokun';
  formNote.textContent = 'Kaydedince kıyafet "Dolapta" durumuyla eklenecek.';
  formNote.classList.remove('error');
  document.querySelectorAll('#categorySegmented button').forEach(b => b.classList.remove('is-active'));
}

document.getElementById('addBtn').addEventListener('click', openModal);
document.getElementById('cancelAddBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

categorySeg.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  selectedCategory = btn.dataset.category;
  document.querySelectorAll('#categorySegmented button').forEach(b => b.classList.remove('is-active'));
  btn.classList.add('is-active');
});

fieldPhoto.addEventListener('change', () => {
  const file = fieldPhoto.files && fieldPhoto.files[0];
  if(!file) return;
  selectedPhotoFile = file;
  const url = URL.createObjectURL(file);
  photoThumb.innerHTML = `<img src="${url}" alt="önizleme">`;
  photoDropText.textContent = file.name;
});

addForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = fieldName.value.trim();
  if(!name || !selectedCategory){
    formNote.textContent = 'Lütfen isim gir ve bir kategori seç.';
    formNote.classList.add('error');
    return;
  }
  formNote.classList.remove('error');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Kaydediliyor...';
  const subtype = fieldSubtype.value.trim() || null;
  let imageUrl = null;

  try{
    if(dbConnected){
      if(selectedPhotoFile){
        const ext = selectedPhotoFile.name.split('.').pop();
        const path = `${crypto.randomUUID()}.${ext}`;
        const { error: uploadError } = await supabaseClient
          .storage
          .from('clothes-images')
          .upload(path, selectedPhotoFile);
        if(uploadError) throw uploadError;
        const { data: pub } = supabaseClient.storage.from('clothes-images').getPublicUrl(path);
        imageUrl = pub.publicUrl;
      }
      const { data, error } = await supabaseClient
        .from('clothes')
        .insert({ name, category: selectedCategory, subtype, image_url: imageUrl, status: 'dolapta' })
        .select()
        .single();
      if(error) throw error;
      mockClothes.unshift(data);
      showToast('✅ Kıyafet eklendi ve Supabase\'e kaydedildi.');
    } else {
      if(selectedPhotoFile){ imageUrl = URL.createObjectURL(selectedPhotoFile); }
      const localItem = {
        id: Date.now(),
        name, category: selectedCategory, subtype, image_url: imageUrl, status: 'dolapta'
      };
      mockClothes.unshift(localItem);
      showToast('⚠️ Supabase bağlı değil, kıyafet sadece geçici olarak eklendi.', true);
    }
    const activeFilter = document.querySelector('.tab.active').dataset.filter;
    renderGrid(activeFilter);
    closeModal();
  }catch(err){
    console.error('Kıyafet eklenirken hata:', err);
    formNote.textContent = 'Kaydedilemedi: ' + err.message;
    formNote.classList.add('error');
  }finally{
    submitBtn.disabled = false;
    submitBtn.textContent = 'Kaydet';
  }
});
</script>
