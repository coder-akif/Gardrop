<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gardırop — Dijital Dolap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     TASARIM SİSTEMİ — "Askı Etiketi" (Hang-Tag) Konsepti
     Fikir: Gerçek kıyafet bakım etiketlerinden / askı fişlerinden
     ilham alan, ip ve delikli etiket motifini tüm arayüzde
     tekrar eden bir imza öğesi olarak kullanıyoruz.
     ============================================================ */
  :root{
    --ink:        #211E1B;   /* karanlık mod zemin — loş dolap ahşabı */
    --ink-surface:#2B2724;   /* karanlık mod kart yüzeyi */
    --ink-surface-2:#332E2A;
    --ink-text:   #EDE7DC;   /* karanlık modda ana metin */
    --ink-muted:  #A99E8E;

    --linen:      #F6F2EA;   /* aydınlık mod zemin — keten beyazı */
    --linen-surface:#FFFFFF;
    --linen-surface-2:#EFE9DD;
    --linen-text: #2B2724;
    --linen-muted:#7A7264;

    --brass:      #C89B3C;   /* birincil vurgu — pirinç toka/düğme */
    --brass-ink:  #4A3A12;
    --sage:       #6E8F6C;   /* dolapta / temiz */
    --rust:       #B25539;   /* kirlide */
    --denim:      #4C7A9E;   /* makinede */

    --radius-tag: 14px;
    --radius-pill: 999px;
    --shadow-card: 0 6px 20px rgba(0,0,0,0.18);
    --font-display: 'IBM Plex Mono', 'Courier New', monospace;
    --font-body: 'Sora', system-ui, -apple-system, sans-serif;

    color-scheme: light;
    --bg: var(--linen);
    --surface: var(--linen-surface);
    --surface-2: var(--linen-surface-2);
    --text: var(--linen-text);
    --muted: var(--linen-muted);
  }

  [data-theme="dark"]{
    color-scheme: dark;
    --bg: var(--ink);
    --surface: var(--ink-surface);
    --surface-2: var(--ink-surface-2);
    --text: var(--ink-text);
    --muted: var(--ink-muted);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  html{ overflow-x:hidden; width:100%; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    width: 100%;
    transition: background 0.25s ease, color 0.25s ease;
    -webkit-font-smoothing: antialiased;
  }
  body.no-scroll{
    /* Modal açıkken arka plan sayfasının kaymasını/scroll olmasını engeller */
    position: fixed;
    inset: 0;
    width: 100%;
    overflow: hidden;
  }
  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }

  /* ---------- KLAVYE ERİŞİLEBİLİRLİĞİ ---------- */
  :focus-visible{
    outline: 2px solid var(--brass);
    outline-offset: 2px;
  }
  button:focus-visible, .tab:focus-visible, .status-chip:focus-visible{
    outline-offset: 1px;
  }

  .app{
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }
  @media (min-width: 900px){
    .app{ max-width: 960px; padding-top: 32px; }
  }
  @media (min-width: 1280px){
    .app{ max-width: 1180px; }
  }

  /* ---------- ÜST BAR ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 22px;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand-mark{
    font-family: var(--font-display);
    font-weight:700;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .brand-mark span{ color: var(--brass); }
  .brand-sub{
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-display);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---------- Bağlantı göstergesi (Supabase durumu) ---------- */
  .conn-dot{
    display:inline-block;
    width:8px; height:8px;
    border-radius:50%;
    margin-left:8px;
    background: var(--muted);
    vertical-align: middle;
    transition: background .2s ease;
  }
  .conn-dot[data-state="online"]{ background: var(--sage); box-shadow:0 0 0 3px color-mix(in srgb, var(--sage) 25%, transparent); }
  .conn-dot[data-state="offline"]{ background: var(--rust); box-shadow:0 0 0 3px color-mix(in srgb, var(--rust) 25%, transparent); }
  .conn-label{
    font-family: var(--font-display);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-top: 2px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    text-decoration: underline dotted;
    text-underline-offset: 2px;
  }

  .theme-toggle{
    width:42px; height:42px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--surface-2);
    background: var(--surface);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color: var(--text);
    box-shadow: var(--shadow-card);
  }
  .theme-toggle svg{ width:20px; height:20px; }

  /* ---------- ASKI RAYI SEKMELERİ (imza öğesi #1) ---------- */
  .rail{
    position:relative;
    margin-bottom: 26px;
  }
  .rail-line{
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background: linear-gradient(90deg, var(--brass), var(--surface-2) 85%);
    border-radius: 3px;
    opacity:0.6;
  }
  .tabs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    overflow-y:hidden;
    max-width:100%;
    padding-top: 14px;
    scrollbar-width:none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    position:relative;
    flex: 0 0 auto;
    font-family: var(--font-display);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight:600;
    padding: 9px 16px 8px;
    border-radius: 0 0 10px 10px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--surface-2);
    border-top: none;
    cursor:pointer;
    white-space:nowrap;
    transition: color .15s ease, background .15s ease, transform .15s ease;
  }
  .tab::before{
    /* askı ipi çentiği */
    content:"";
    position:absolute;
    top:-14px; left:50%;
    transform: translateX(-50%);
    width:2px; height:14px;
    background: var(--surface-2);
  }
  .tab.active{
    color: var(--bg);
    background: var(--brass);
    border-color: var(--brass);
  }
  .tab.active::before{ background: var(--brass); }
  .tab .count{
    margin-left:6px;
    opacity:0.7;
    font-weight:500;
  }

  /* ---------- KOMBİN ÖNERİ BUTONU ---------- */
  .combo-cta{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding: 18px 20px;
    margin-bottom: 28px;
    border-radius: var(--radius-tag);
    border: 2px dashed var(--brass);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
    font-weight:700;
    font-size: 16px;
    cursor:pointer;
    box-shadow: var(--shadow-card);
    transition: transform .15s ease, background .15s ease;
  }
  .combo-cta:hover{ transform: translateY(-2px); }
  .combo-cta:active{ transform: translateY(0); }
  .combo-cta .emoji{ font-size:20px; }

  /* ---------- KIYAFET IZGARASI ---------- */
  .section-label{
    font-family: var(--font-display);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color: var(--muted);
    margin: 4px 0 12px;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width:520px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
  @media (min-width:1280px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
  }

  /* ---------- ASKI ETİKETİ KARTI (imza öğesi #2) ---------- */
  .card{
    position:relative;
    background: var(--surface);
    border: 1px dashed var(--surface-2);
    border-radius: var(--radius-tag);
    padding: 14px 12px 12px;
    box-shadow: var(--shadow-card);
    animation: card-in .25s ease both;
  }
  @keyframes card-in{
    from{ opacity:0; transform: translateY(4px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .card::before{
    /* etiket ipi + deliği */
    content:"";
    position:absolute;
    top:-11px; left:50%;
    transform: translateX(-50%);
    width:14px; height:14px;
    border-radius:50%;
    border: 2px solid var(--muted);
    background: var(--bg);
  }
  .card::after{
    content:"";
    position:absolute;
    top:-3px; left:50%;
    transform: translateX(-50%);
    width:2px; height:12px;
    background: var(--muted);
  }
  .card-photo{
    width:100%;
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:10px;
    overflow:hidden;
    cursor: zoom-in;
  }
  .card-photo img{ width:100%; height:100%; object-fit:cover; }
  .card-photo svg{ width:34px; height:34px; color: var(--muted); }

  .card-name{
    font-weight:700;
    font-size:14px;
    margin:0 0 2px;
    line-height:1.25;
  }
  .card-cat{
    font-family: var(--font-display);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color: var(--muted);
    margin: 0 0 10px;
  }

  /* ---------- KART ÜSTÜ 3 NOKTA MENÜSÜ (düzenle/sil) ---------- */
  .card-menu-btn{
    position:absolute;
    top:8px; right:8px;
    width:26px; height:26px;
    border-radius:50%;
    border:1px solid var(--surface-2);
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: blur(2px);
    color: var(--text);
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    line-height:1;
    cursor:pointer;
    z-index:3;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .card-menu{
    position:absolute;
    top:38px; right:8px;
    z-index:6;
    min-width:132px;
    background: var(--surface);
    border:1px solid var(--surface-2);
    border-radius:10px;
    box-shadow: var(--shadow-card);
    overflow:hidden;
    display:none;
  }
  .card-menu.open{ display:block; }
  .card-menu button{
    display:flex; align-items:center; gap:8px;
    width:100%;
    padding:9px 12px;
    background:none;
    border:none;
    border-bottom:1px solid var(--surface-2);
    text-align:left;
    font-family: var(--font-body);
    font-size:12.5px;
    color: var(--text);
    cursor:pointer;
  }
  .card-menu button:last-child{ border-bottom:none; }
  .card-menu button:hover{ background: var(--surface-2); }
  .card-menu button.danger{ color: var(--rust); }

  /* ---------- FOTOĞRAF LIGHTBOX (tam ekran görünüm) ---------- */
  .lightbox-overlay{
    position: fixed; inset: 0;
    z-index: 200;
    background: rgba(10,10,9,0.94);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
    animation: lb-fade 0.2s ease;
  }
  .lightbox-overlay.open{ display: flex; }
  @keyframes lb-fade{ from{ opacity:0; } to{ opacity:1; } }
  .lightbox-overlay img{
    max-width: 90vw;
    max-height: 86vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close{
    position: absolute;
    top: 24px; right: 24px;
    width: 44px; height: 44px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    background: transparent;
    color: #fff;
    font-size: 1.3rem;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .lightbox-close:hover{ background: rgba(255,255,255,0.1); border-color: #fff; }
  .lightbox-caption{
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.75);
    font-family: var(--font-display);
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
    max-width: 80vw;
  }
  @media (max-width: 768px){
    .lightbox-overlay{ padding: 16px; }
    .lightbox-close{ top: 14px; right: 14px; width: 38px; height: 38px; font-size: 1.1rem; }
    .lightbox-caption{ font-size: 0.7rem; bottom: 14px; }
  }

  .status-row{
    display:flex;
    gap:5px;
  }
  .status-chip{
    flex:1;
    font-family: var(--font-display);
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.02em;
    font-weight:600;
    text-align:center;
    padding: 6px 2px;
    border-radius: var(--radius-pill);
    border:1px solid var(--surface-2);
    background: transparent;
    color: var(--muted);
    cursor:pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .status-chip[data-state="dolapta"].is-active{ background: var(--sage); border-color: var(--sage); color:#fff; }
  .status-chip[data-state="kirlide"].is-active{ background: var(--rust); border-color: var(--rust); color:#fff; }
  .status-chip[data-state="makinede"].is-active{ background: var(--denim); border-color: var(--denim); color:#fff; }

  /* ---------- + EKLE — YÜZEN BUTON ---------- */
  .fab{
    position: fixed;
    right: 20px;
    bottom: 24px;
    width: 58px; height:58px;
    border-radius: 50%;
    background: var(--brass);
    color: var(--ink);
    border:none;
    font-size: 28px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    cursor:pointer;
    transition: transform .15s ease;
  }
  .fab:hover{ transform: scale(1.06) rotate(90deg); }

  .empty-state{
    text-align:center;
    padding: 40px 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state .emoji{ font-size:32px; display:block; margin-bottom:10px; }
  .empty-state .emoji.spin{ animation: spin 1.1s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  /* ---------- ADIM 3: KIYAFET EKLEME MODALI ---------- */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(20,17,14,0.55);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index: 50;
    padding: 0;
  }
  .modal-overlay.open{ display:flex; }
  @media (min-width:520px){
    .modal-overlay{ align-items:center; }
  }
  .modal-box{
    position:relative;
    width:100%;
    max-width: 480px;
    max-height: 92vh;
    max-height: 92dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    background: var(--surface);
    border-radius: 18px 18px 0 0;
    padding: 22px 18px 24px;
    box-shadow: var(--shadow-card);
    animation: modal-in .18s ease;
  }
  @media (min-width:520px){
    .modal-box{ border-radius: var(--radius-tag); margin: 20px; }
  }
  @keyframes modal-in{ from{ transform: translateY(16px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .modal-box::before{
    content:"";
    position:absolute;
    top:-11px; left:50%;
    transform: translateX(-50%);
    width:14px; height:14px;
    border-radius:50%;
    border: 2px solid var(--muted);
    background: var(--bg);
  }
  .modal-title{
    font-family: var(--font-display);
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing:0.05em;
    font-weight:700;
    margin: 4px 0 18px;
  }
  .field-label{
    display:block;
    font-family: var(--font-display);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color: var(--muted);
    margin-bottom:6px;
  }
  .field-group{ margin-bottom:16px; }
  .text-input{
    width:100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--surface-2);
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size:14px;
  }
  .text-input:focus{ outline: 2px solid var(--brass); outline-offset:1px; }

  .segmented{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:8px;
  }
  .segmented button{
    display:flex; align-items:center; gap:6px; justify-content:center;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--surface-2);
    background: var(--bg);
    color: var(--muted);
    font-family: var(--font-body);
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition: all .12s ease;
  }
  .segmented button svg{ width:16px; height:16px; }
  .segmented button.is-active{
    background: var(--brass);
    border-color: var(--brass);
    color: var(--ink);
  }
  .segmented button.segmented-wide{ grid-column: 1 / -1; }

  /* ---------- RENK SEÇİCİ (kombin renk uyumu için) ---------- */
  .color-picker{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .color-swatch{
    width:32px; height:32px;
    border-radius:50%;
    border:2px solid var(--surface-2);
    cursor:pointer;
    padding:0;
    position:relative;
    box-shadow: inset 0 0 0 2px var(--surface);
    transition: transform .12s ease, border-color .12s ease;
  }
  .color-swatch:hover{ transform: scale(1.08); }
  .color-swatch.is-active{
    border-color: var(--brass);
  }
  .color-swatch.is-active::after{
    content:"✓";
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700;
    color:#fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .color-swatch.color-none{
    background: var(--bg);
    display:flex; align-items:center; justify-content:center;
    color: var(--muted);
    font-size:15px;
  }
  .color-swatch.color-none.is-active::after{ content:""; }
  .color-swatch.color-none.is-active{ color: var(--brass); }

  .photo-drop{
    display:flex; align-items:center; gap:12px;
    border: 1px dashed var(--surface-2);
    border-radius: 10px;
    padding: 10px 12px;
    cursor:pointer;
    background: var(--bg);
  }
  .photo-drop .thumb{
    width:48px; height:48px;
    border-radius:8px;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    flex-shrink:0;
  }
  .photo-drop .thumb img{ width:100%; height:100%; object-fit:cover; }
  .photo-drop .thumb svg{ width:20px; height:20px; color: var(--muted); }
  .photo-drop .drop-text{ font-size:12.5px; color: var(--muted); }

  .modal-actions{
    display:flex;
    gap:10px;
    margin-top: 20px;
  }
  .btn{
    flex:1;
    padding: 12px 14px;
    border-radius: 10px;
    border:none;
    font-family: var(--font-body);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .btn-primary{ background: var(--brass); color: var(--ink); }
  .btn-primary:disabled{ opacity:0.55; cursor:not-allowed; }
  .btn-ghost{ background: var(--surface-2); color: var(--text); }

  .form-note{
    font-size:11.5px;
    color: var(--muted);
    margin-top:2px;
  }
  .form-note.error{ color: var(--rust); }

  .toast{
    position: fixed;
    left:50%; bottom: 24px;
    transform: translateX(-50%);
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--surface-2);
    box-shadow: var(--shadow-card);
    padding: 12px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    z-index: 60;
    display:none;
  }
  .toast.show{ display:block; animation: modal-in .18s ease; }

  /* ---------- ADIM 6: GÜNÜN KOMBİNİ SONUÇ MODALI ---------- */
  .combo-box{ max-width: 460px; }
  .combo-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 4px 0 6px;
  }
  .combo-item{
    position:relative;
    background: var(--bg);
    border: 1px dashed var(--surface-2);
    border-radius: 12px;
    padding: 10px;
    text-align:center;
    animation: card-in .3s ease both;
  }
  .combo-photo{
    width:100%;
    aspect-ratio: 1/1;
    border-radius: 8px;
    background: var(--surface-2);
    display:flex; align-items:center; justify-content:center;

  const items = activeFilter === 'tumu' ? mockClothes : mockClothes.filter(c => c.status === activeFilter);

async function fetchClothes(){
  if(!dbConnected){
    mockClothes = mockClothesFallback.slice();
    renderGrid();
    return;
  }
  const grid = document.getElementById('clothesGrid');
  grid.innerHTML = `<div class="empty-state" style="grid-column: 1/-1">
    <span class="emoji spin">⏳</span> Kıyafetler yükleniyor...
  </div>`;
  try{
    const { data, error } = await supabaseClient
      .from('clothes')
      .select('*')
      .order('created_at', { ascending: false });
    if(error) throw error;
    mockClothes = data || [];
    renderGrid();
  }catch(e){
    console.error('Kıyafetler çekilirken hata:', e);

async function updateClothStatus(id, newState){
  const item = mockClothes.find(c => c.id === id);
  if(!item) return;
  const prevStatus = item.status;
  item.status = newState;
  renderGrid();
  if(!dbConnected){
    showToast('⚠️ Supabase bağlı değil, değişiklik geçici (kaydedilmedi).', true);
    return;
  }
  try{
    const { error } = await supabaseClient
      .from('clothes')
      .update({ status: newState })
      .eq('id', id);
    if(error) throw error;
  }catch(e){
    console.error('Durum güncellenirken hata:', e);
    item.status = prevStatus;
    renderGrid();
    showToast('⚠️ Durum güncellenemedi: ' + e.message, true);
  }
}

function subscribeRealtime(){
  if(!dbConnected || !supabaseClient) return;
  supabaseClient
    .channel('clothes-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'clothes' }, (payload) => {
      if(payload.eventType === 'INSERT'){
        if(!mockClothes.some(c => c.id === payload.new.id)){
          mockClothes.unshift(payload.new);
        }
      } else if(payload.eventType === 'UPDATE'){
        const idx = mockClothes.findIndex(c => c.id === payload.new.id);
        if(idx !== -1) mockClothes[idx] = payload.new;
        else mockClothes.unshift(payload.new);
      } else if(payload.eventType === 'DELETE'){
        mockClothes = mockClothes.filter(c => c.id !== payload.old.id);
      }
      renderGrid();
    })
    .subscribe((status) => {
      if(status === 'SUBSCRIBED') console.info('🔄 Realtime aboneliği aktif (clothes tablosu).');
    });
}

function pickRandom(arr){
  return arr.length ? arr[Math.floor(Math.random() * arr.length)] : null;
}

/* ============================================================
   RENK UYUMU MOTORU (ücretsiz, tamamen tarayıcıda çalışır)
   Harici bir yapay zeka servisine bağlanmaz; kıyafet isminde
   geçen renk kelimelerini tanıyıp basit stil kurallarıyla
   en uyumlu kombinasyonu seçer.
   ============================================================ */
const colorKeywords = {
  siyah:'siyah', beyaz:'beyaz', gri:'gri', lacivert:'lacivert',
  mavi:'mavi', kirmizi:'kirmizi', 'kırmızı':'kirmizi',
  yesil:'yesil', 'yeşil':'yesil', sari:'sari', 'sarı':'sari',
  mor:'mor', pembe:'pembe', kahverengi:'kahverengi', bej:'bej',
  turuncu:'turuncu', bordo:'bordo', haki:'haki', krem:'bej',
  gold:'sari', altin:'sari', 'altın':'sari', gumus:'gri', 'gümüş':'gri',
};
const colorDisplayNames = {
  siyah:'Siyah', beyaz:'Beyaz', gri:'Gri', bej:'Bej', krem:'Krem',
  lacivert:'Lacivert', mavi:'Mavi', kirmizi:'Kırmızı', yesil:'Yeşil',
  sari:'Sarı', mor:'Mor', pembe:'Pembe', turuncu:'Turuncu',
  bordo:'Bordo', kahverengi:'Kahverengi', haki:'Haki',
};
function colorFieldLabelText(colorKey){
  const base = 'Renk (opsiyonel — kombin önerisi için kullanılır)';
  if(!colorKey) return base;
  const displayName = colorDisplayNames[colorKey] || colorKey;
  return `${base} — Seçili: ${displayName}`;
}
const neutralColors = new Set(['siyah','beyaz','gri','lacivert','bej','kahverengi','haki']);
const clashPairs = [
  ['kirmizi','yesil'], ['mor','sari'], ['pembe','turuncu'],
  ['mor','kirmizi'], ['turuncu','yesil'], ['kahverengi','siyah'],
];
function isClash(a, b){
  return clashPairs.some(([x,y]) => (a===x && b===y) || (a===y && b===x));
}

function detectColor(item){
  if(!item) return null;
  if(item.color && colorKeywords[item.color]) return colorKeywords[item.color];
  if(item.color) return item.color; // zaten normalize edilmiş bir anahtar olabilir
  const text = `${item.name} ${item.subtype || ''}`.toLowerCase();
  for(const key in colorKeywords){
    if(text.includes(key)) return colorKeywords[key];
  }
  return null;
}

/* İki parçanın renk uyum puanı: aynı renk / nötr renk / çatışan renk */
function pairScore(colorA, colorB){
  if(!colorA || !colorB) return 0; // renk bilgisi yoksa nötr say
  if(colorA === colorB) return 2;
  if(neutralColors.has(colorA) || neutralColors.has(colorB)) return 1;
  if(isClash(colorA, colorB)) return -3;
  return 0;
}

function scoreOutfit(outfit){
  const pieces = ['dis_giyim','ust_giyim','alt_giyim','ayakkabi']
    .map(k => outfit[k]).filter(Boolean);
  const colors = pieces.map(detectColor);
  let score = 0;
  for(let i = 0; i < colors.length; i++){
    for(let j = i+1; j < colors.length; j++){
      score += pairScore(colors[i], colors[j]);
    }
  }
  return score;
}

let lastOutfitKey = null;

function generateOutfit(){
  const clean = mockClothes.filter(c => c.status === 'dolapta');
  const tops    = clean.filter(c => c.category === 'ust_giyim');
  const bottoms = clean.filter(c => c.category === 'alt_giyim');
  const shoes   = clean.filter(c => c.category === 'ayakkabi');
  const outer   = clean.filter(c => c.category === 'dis_giyim');
  if(tops.length === 0 || bottoms.length === 0){
    return { ok:false };
  }

  // Birden çok rastgele aday üret, renk uyumuna göre en iyilerinden birini seç.
  const attempts = 40;
  const candidates = [];
  const seen = new Set();
  for(let i = 0; i < attempts; i++){
    const outfit = {
      dis_giyim: pickRandom(outer),
      ust_giyim: pickRandom(tops),
      alt_giyim: pickRandom(bottoms),
      ayakkabi:  pickRandom(shoes),
    };
    const key = [outfit.dis_giyim, outfit.ust_giyim, outfit.alt_giyim, outfit.ayakkabi]
      .map(p => p ? p.id : 'x').join('|');
    if(seen.has(key)) continue;
    seen.add(key);
    candidates.push({ outfit, score: scoreOutfit(outfit), key });
  }
  candidates.sort((a, b) => b.score - a.score);

  // Aynı kombin arka arkaya tekrar etmesin — başka bir seçenek varsa öncekini ele.
  let pool = candidates;
  if(candidates.length > 1 && lastOutfitKey){
    const withoutLast = candidates.filter(c => c.key !== lastOutfitKey);
    if(withoutLast.length > 0) pool = withoutLast;
  }

  const topSlice = pool.slice(0, Math.min(3, pool.length));
  const chosen = pickRandom(topSlice) || pool[0];
  lastOutfitKey = chosen.key;

  return { ok:true, outfit: chosen.outfit, smart: chosen.score > 0 };
}

  formNote.classList.remove('error');
  submitBtn.disabled = true;

  const subtype = fieldSubtype.value.trim() || null;
  let imageUrl = null;

  try{
    if(dbConnected){
      if(selectedPhotoFile){
        const ext = selectedPhotoFile.name.split('.').pop();
        const path = `${crypto.randomUUID()}.${ext}`;
        const { error: uploadError } = await supabaseClient
          .storage
          .from('clothes-images')
          .upload(path, selectedPhotoFile);
        if(uploadError) throw uploadError;
        const { data: pub } = supabaseClient.storage.from('clothes-images').getPublicUrl(path);
        imageUrl = pub.publicUrl;
      }
      const { data, error } = await supabaseClient
        .from('clothes')
        .insert({ name, category: selectedCategory, subtype, color: selectedColor, image_url: imageUrl, status: 'dolapta' })
        .select()
        .single();
      if(error) throw error;
      mockClothes.unshift(data);
      showToast('✅ Kıyafet eklendi ve Supabase\'e kaydedildi.');
    } else {
      if(selectedPhotoFile){ imageUrl = URL.createObjectURL(selectedPhotoFile); }
      const localItem = {
        id: Date.now(),
        name, category: selectedCategory, subtype, color: selectedColor, image_url: imageUrl, status: 'dolapta'
      };
      mockClothes.unshift(localItem);
      showToast('⚠️ Supabase bağlı değil, kıyafet sadece geçici olarak eklendi.', true);
    }
    const activeFilter = document.querySelector('.tab.active').dataset.filter;
    renderGrid(activeFilter);
    closeModal();

    console.error('Kıyafet eklenirken hata:', err);
    formNote.textContent = 'Kaydedilemedi: ' + err.message;
    formNote.classList.add('error');
  }finally{
    submitBtn.disabled = false;

});

let editSelectedPhotoFile = null;
const emptyThumbEditSvg = photoThumbEdit.innerHTML;

function openEditModal(item){
  editItemIdField.value = item.id;
  fieldNameEdit.value = item.name || '';
  fieldSubtypeEdit.value = item.subtype || '';
  editSelectedCategory = item.category || null;
  editSelectedColor = item.color || null;
  editSelectedPhotoFile = null;
  formNoteEdit.textContent = 'Değişiklikler kaydedilince tüm cihazlarda güncellenecek.';
  formNoteEdit.classList.remove('error');

  document.querySelectorAll('#categorySegmentedEdit button').forEach(b => {
    b.classList.toggle('is-active', b.dataset.category === item.category);
  });

  document.querySelectorAll('#colorPickerEdit .color-swatch').forEach(b => {
    const isMatch = (b.dataset.color || null) === (item.color || null);
    b.classList.toggle('is-active', isMatch);
  });
  colorLabelElEdit.textContent = colorFieldLabelText(item.color || null);

  if(item.image_url){
    photoThumbEdit.innerHTML = `<img src="${item.image_url}" alt="önizleme">`;
    photoDropTextEdit.textContent = 'Değiştirmek için dokun';
  } else {
    photoThumbEdit.innerHTML = emptyThumbEditSvg;
    photoDropTextEdit.textContent = 'Fotoğraf eklemek için dokun';
  }

  editOverlay.classList.add('open');
  markOverlayOpen('edit');
}

function closeEditModal(){
  editOverlay.classList.remove('open');
  markOverlayClosed('edit');
}

document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
editOverlay.addEventListener('click', (e) => { if(e.target === editOverlay) closeEditModal(); });

categorySegEdit.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  editSelectedCategory = btn.dataset.category;
  document.querySelectorAll('#categorySegmentedEdit button').forEach(b => b.classList.remove('is-active'));
  btn.classList.add('is-active');
});

colorSegEdit.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  editSelectedColor = btn.dataset.color || null;
  document.querySelectorAll('#colorPickerEdit .color-swatch').forEach(b => b.classList.remove('is-active'));
  btn.classList.add('is-active');
  colorLabelElEdit.textContent = colorFieldLabelText(editSelectedColor);
});

fieldPhotoEdit.addEventListener('change', () => {
  const file = fieldPhotoEdit.files && fieldPhotoEdit.files[0];
  if(!file) return;
  editSelectedPhotoFile = file;
  const url = URL.createObjectURL(file);
  photoThumbEdit.innerHTML = `<img src="${url}" alt="önizleme">`;
  photoDropTextEdit.textContent = file.name;
});

editForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = editItemIdField.value;
  const item = mockClothes.find(c => String(c.id) === String(id));
  if(!item) return;

  const name = fieldNameEdit.value.trim();
  if(!name || !editSelectedCategory){
    formNoteEdit.textContent = 'Lütfen isim gir ve bir kategori seç.';
    formNoteEdit.classList.add('error');
    return;
  }
  formNoteEdit.classList.remove('error');
  submitEditBtn.disabled = true;
  submitEditBtn.textContent = 'Kaydediliyor...';
  const subtype = fieldSubtypeEdit.value.trim() || null;
  let imageUrl = item.image_url || null;

  try{
    if(dbConnected){
      if(editSelectedPhotoFile){
        const ext = editSelectedPhotoFile.name.split('.').pop();
        const path = `${crypto.randomUUID()}.${ext}`;
        const { error: uploadError } = await supabaseClient
          .storage
          .from('clothes-images')
          .upload(path, editSelectedPhotoFile);
        if(uploadError) throw uploadError;
        const { data: pub } = supabaseClient.storage.from('clothes-images').getPublicUrl(path);
        imageUrl = pub.publicUrl;
      }
      const { data, error } = await supabaseClient
        .from('clothes')
        .update({ name, category: editSelectedCategory, subtype, color: editSelectedColor, image_url: imageUrl })
        .eq('id', id)
        .select()
        .single();
      if(error) throw error;
      const idx = mockClothes.findIndex(c => String(c.id) === String(id));
      if(idx !== -1) mockClothes[idx] = data;
      showToast('✅ Değişiklikler kaydedildi.');
    } else {
      if(editSelectedPhotoFile){ imageUrl = URL.createObjectURL(editSelectedPhotoFile); }
      const idx = mockClothes.findIndex(c => String(c.id) === String(id));
      if(idx !== -1){
        mockClothes[idx] = { ...mockClothes[idx], name, category: editSelectedCategory, subtype, color: editSelectedColor, image_url: imageUrl };
      }
      showToast('⚠️ Supabase bağlı değil, değişiklik geçici.', true);
    }
    renderGrid();
    closeEditModal();
  }catch(err){
    console.error('Düzenlenirken hata:', err);
    formNoteEdit.textContent = 'Kaydedilemedi: ' + err.message;
    formNoteEdit.classList.add('error');
  }finally{
    submitEditBtn.disabled = false;
    submitEditBtn.textContent = 'Kaydet';
  }
});
</script>
</body>
</html>
